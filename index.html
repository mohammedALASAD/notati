<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notati - Study Notes for University Students in Bahrain</title>
  <meta name="description" content="Clear, well-made lecture notes and chapter summaries for university courses in Bahrain. The first chapter of every course is free - browse by college and course." />
  <link rel="canonical" href="https://notati.app/" />
  <meta name="theme-color" content="#6B5744" />

  <!-- Favicon (what shows in Google results and the browser tab).
       Google needs a square icon it can crawl; keep these URLs stable. -->
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- Link preview when shared on WhatsApp / Instagram / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Notati" />
  <meta property="og:title" content="Notati - Study Notes for University Students in Bahrain" />
  <meta property="og:description" content="Clear, well-made lecture notes and chapter summaries for university courses in Bahrain. The first chapter of every course is free." />
  <meta property="og:url" content="https://notati.app/" />
  <meta property="og:image" content="https://notati.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Notati - Study Notes for University Students in Bahrain" />
  <meta name="twitter:description" content="Clear, well-made lecture notes and chapter summaries for university courses in Bahrain. The first chapter of every course is free." />
  <meta name="twitter:image" content="https://notati.app/og-image.png" />

  <!-- Apply saved theme before CSS paints to prevent flash -->
  <script>(function(){var t=localStorage.getItem('notati-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}());</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <!-- Bump ?v= on every deploy so browsers fetch fresh files instead of cached ones -->
  <link rel="stylesheet" href="ds/colors_and_type.css?v=20260708d" />
  <link rel="stylesheet" href="src/app.css?v=20260708d" />

  <!-- React + Babel (pinned versions) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- API base URL — change this to your Render backend URL in production -->
  <script>window.NOTATI_API_URL = 'https://api.notati.app/api';</script>

  <!-- API client (plain JS, must be before store.js) -->
  <script src="src/api.js?v=20260708d"></script>

  <!-- Storage layer (plain JS) -->
  <script src="src/store.js?v=20260708d"></script>

  <!-- React components (JSX, must be ordered: shared components first) -->
  <script type="text/babel" src="src/components.jsx?v=20260708d"></script>
  <script type="text/babel" src="src/auth.jsx?v=20260708d"></script>
  <script type="text/babel" src="src/admin.jsx?v=20260708d"></script>
  <script type="text/babel" src="src/customer.jsx?v=20260708d"></script>
  <script type="text/babel" src="src/app.jsx?v=20260708d"></script>

  <!-- Safety net: if the app never mounts (e.g. a script fails to load/parse
       on an old browser), show a friendly message instead of a blank page. -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,-apple-system,sans-serif;text-align:center">' +
            '<div style="max-width:420px"><div style="font-size:40px">⚠️</div>' +
            '<h2 style="margin:8px 0">Couldn\'t load the app</h2>' +
            '<p style="color:#666;font-size:14px;margin:0 0 20px">Please update your browser or reload the page. If this keeps happening, contact support.</p>' +
            '<button onclick="location.reload()" style="padding:10px 22px;border-radius:10px;border:0;background:#2f5d50;color:#fff;font-size:14px;cursor:pointer">Reload</button>' +
            '</div></div>';
        }
      }, 8000);
    });
  </script>
</body>
</html>
