<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notati — Notes management prototype</title>

  <!-- Apply saved theme before CSS paints to prevent flash -->
  <script>(function(){var t=localStorage.getItem('notati-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}());</script>

  <!-- API base URL — points at the Django backend in production -->
  <script>window.NOTATI_API_URL = 'https://api.notati.app/api';</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>

  <!-- Vite entry — bundles React + all app code (no in-browser Babel) -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Safety net: if the app never mounts, show a friendly message
       instead of a blank page. -->
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,-apple-system,sans-serif;text-align:center">' +
            '<div style="max-width:420px"><div style="font-size:40px">⚠️</div>' +
            '<h2 style="margin:8px 0">Couldn\'t load the app</h2>' +
            '<p style="color:#666;font-size:14px;margin:0 0 20px">Please reload the page. If this keeps happening, contact support.</p>' +
            '<button onclick="location.reload()" style="padding:10px 22px;border-radius:10px;border:0;background:#2f5d50;color:#fff;font-size:14px;cursor:pointer">Reload</button>' +
            '</div></div>';
        }
      }, 8000);
    });
  </script>
</body>
</html>
