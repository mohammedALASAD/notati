<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notati — Notes management prototype</title>

  <!-- Apply saved theme before CSS paints to prevent flash -->
  <script>(function(){var t=localStorage.getItem('notati-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}());</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Overlock:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ds/colors_and_type.css" />
  <link rel="stylesheet" href="src/app.css" />

  <!-- React + Babel (pinned versions) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- API base URL — change this to your Render backend URL in production -->
  <script>window.NOTATI_API_URL = 'https://api.notati.app/api';</script>

  <!-- API client (plain JS, must be before store.js) -->
  <script src="src/api.js"></script>

  <!-- Storage layer (plain JS) -->
  <script src="src/store.js"></script>

  <!-- React components (JSX, must be ordered: shared components first) -->
  <script type="text/babel" src="src/components.jsx"></script>
  <script type="text/babel" src="src/auth.jsx"></script>
  <script type="text/babel" src="src/admin.jsx"></script>
  <script type="text/babel" src="src/customer.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
