services:
  - type: web
    name: notati-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: gunicorn notati.wsgi --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend-url.com
      - key: DATABASE_URL
        fromDatabase:
          name: notati-db
          property: connectionString

databases:
  - name: notati-db
    databaseName: notati
    user: notati
